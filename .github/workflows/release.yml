name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: info
        run: |
          CURRENT="${GITHUB_REF#refs/tags/}"
          VERSION="${CURRENT#v}"
          PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        run: |
          PREV="${{ steps.info.outputs.prev }}"
          if [ -z "$PREV" ]; then
            RAW=$(git log --pretty=format:"%s" HEAD)
          else
            RAW=$(git log --pretty=format:"%s" "$PREV..HEAD")
          fi

          # Strip noisy release/test commits
          RAW=$(echo "$RAW" | grep -viE '^(add version for release|check release|add release action|check release[0-9]*)$')

          features=""
          fixes=""
          other=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Capitalize first letter, fix common typos
            clean=$(echo "$msg" \
              | sed 's/^add /Add /I; s/^show /Show /I; s/^remove /Remove /I; s/^fix /Fix /I; s/^change /Update /I; s/^update /Update /I; s/^hide /Hide /I; s/^improve /Improve /I' \
              | sed 's/comming/coming/g; s/affices/offices/g; s/shortocode/shortcode/g; s/brandid/brand ID/g')
            lower=$(echo "$msg" | tr '[:upper:]' '[:lower:]')
            case "$lower" in
              add*|show*|new*|enable*)   features="$features\n- $clean" ;;
              fix*|remove*|prevent*)     fixes="$fixes\n- $clean" ;;
              *)                         other="$other\n- $clean" ;;
            esac
          done <<< "$RAW"

          BODY=""
          if [ -n "$features" ]; then
            BODY="${BODY}### New Features\n${features}\n\n"
          fi
          if [ -n "$fixes" ]; then
            BODY="${BODY}### Bug Fixes\n${fixes}\n\n"
          fi
          if [ -n "$other" ]; then
            BODY="${BODY}### Improvements\n${other}\n\n"
          fi
          if [ -z "$BODY" ]; then
            BODY="Minor updates and improvements."
          fi

          {
            echo "body<<NOTES_EOF"
            printf "%b" "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.info.outputs.current }}
          name: "Version ${{ steps.info.outputs.version }}"
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          allowUpdates: true
